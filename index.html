function App() {
  var pageState = useState(function() {
    var h = window.location.hash.slice(1);
    if (h === '/about') return 'about';
    if (h === '/parents') return 'parents';
    return 'home';
  });
  var page = pageState[0], setPage = pageState[1];

  useEffect(function() {
    var handler = function() {
      var h = window.location.hash.slice(1);
      if (h === '/about') setPage('about');
      else if (h === '/parents') setPage('parents');
      else setPage('home');
    };
    window.addEventListener('hashchange', handler);
    return function() { window.removeEventListener('hashchange', handler); };
  }, []);

  useEffect(function() {
    var nextHash = page === 'about' ? '#/about' : page === 'parents' ? '#/parents' : '#/';
    if (window.location.hash !== nextHash) { window.location.hash = nextHash; }
  }, [page]);

  return e('div', { style:{ fontFamily:F.sans, color:C.ink, background:C.sand, lineHeight:1.78, minHeight:'100vh' }},
    e(Nav, { page:page, setPage:setPage }),
    page === 'about' ? e(AboutPage) : page === 'parents' ? e(ParentsPage, { setPage:setPage }) : e(HomePage, { setPage:setPage }),
    e(Footer, { setPage:setPage })
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(e(App));
