      e(FadeIn, { delay:0.1 }, e('p', { style:pInk }, 'My aim is for you to not need me. If we\u2019re still having regular sessions six months from now, I\u2019ve probably not done my job properly.'))
    ),

    // CTA CARD
    e('section', { style: Object.assign({}, w, { paddingTop:28, paddingBottom:80 }) },
      e(FadeIn, null,
        e('div', { style:{ background:C.cream, border:'1px solid rgba(44,42,37,0.08)', borderRadius:10, padding:'32px 28px' }},
          e('p', { style:{ fontFamily:F.serif, fontSize:'clamp(1.15rem, 2.8vw, 1.35rem)', lineHeight:1.4, color:C.ink, marginBottom:10, fontWeight:400 }}, 'Not sure where to start?'),
          e('p', { style: Object.assign({}, ps, { marginBottom:22, fontSize:'clamp(0.9rem, 2vw, 0.98rem)' }) }, 'Take the GAP Profile. It\u2019s free, takes about four minutes, and it\u2019ll probably name something you\u2019ve felt but couldn\u2019t quite put into words.'),
          e('a', { href:GAP, className:'btn-amber', style:{ padding:'13px 26px', fontSize:'.9rem' }}, 'Take the free GAP Profile')
        )
      )
    )
  );
}

function App() {
  var pageState = useState(function() {
    var h = window.location.hash.slice(1);
    return h === '/about' ? 'about' : 'home';
  });
  var page = pageState[0], setPage = pageState[1];

  useEffect(function() {
    var handler = function() {
      setPage(window.location.hash.slice(1) === '/about' ? 'about' : 'home');
    };
    window.addEventListener('hashchange', handler);
    return function() { window.removeEventListener('hashchange', handler); };
  }, []);

  useEffect(function() {
    window.location.hash = page === 'about' ? '/about' : '/';
  }, [page]);

  return e('div', { style:{ fontFamily:F.sans, color:C.ink, background:C.sand, lineHeight:1.78, minHeight:'100vh' }},
    e(Nav, { page:page, setPage:setPage }),
    page === 'about' ? e(AboutPage) : e(HomePage, { setPage:setPage }),
    e(Footer)
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(e(App));

})();
</script>
